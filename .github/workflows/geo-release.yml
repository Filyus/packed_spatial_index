name: "Release: create geo GitHub release"
run-name: "release: create geo GitHub release ${{ github.ref_name }}"

on:
  push:
    tags:
      - "geo-v[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: github-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  github-release:
    name: github-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract changelog section
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#geo-v}"
          awk -v head="## [$version]" '
            index($0, head) == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' geo/CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for $version in geo/CHANGELOG.md."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi
          gh release create "$TAG" \
            --title "packed_spatial_index_geo ${TAG#geo-v}" \
            --notes-file release-notes.md \
            --verify-tag
