name: "Release: prepare version"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without opening or updating a release PR
        required: true
        default: true
        type: boolean

concurrency:
  group: release-plz-pr-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-pr:
    name: release-pr
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'Filyus' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Install release-plz for dry run
        if: ${{ inputs.dry_run }}
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz

      - name: Preview release-plz changes
        if: ${{ inputs.dry_run }}
        run: |
          release-plz update --config release-plz.toml
          git diff -- Cargo.toml CHANGELOG.md

      - name: Run release-plz release-pr
        if: ${{ !inputs.dry_run }}
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
