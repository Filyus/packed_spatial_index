name: "Release: publish crate"
run-name: "release: publish ${{ inputs.crate }}"

# Triggered manually after a `release: prepare <crate> v<version>` commit lands
# on `main` and CI passes. Changelog notes may have been drafted earlier under
# `## [Unreleased]`; this workflow only requires the release commit's HEAD to
# contain a reviewed, non-empty `## [<version>]` section. crates.io Trusted
# Publishing rejects the `workflow_run` event, so the publish cannot run
# automatically after CI; `workflow_dispatch` is the supported path.
on:
  workflow_dispatch:
    inputs:
      crate:
        description: Crate to publish
        required: true
        type: choice
        options:
          - packed_spatial_index
          - packed_spatial_index_geo

concurrency:
  group: crates-io-publish
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  CRATE_NAME: ${{ inputs.crate }}

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.release.outputs.should_publish }}
      version: ${{ steps.meta.outputs.version }}
      release_sha: ${{ steps.resolve.outputs.release_sha }}
      manifest: ${{ steps.meta.outputs.manifest }}
      changelog: ${{ steps.meta.outputs.changelog }}
      tag_prefix: ${{ steps.meta.outputs.tag_prefix }}

    steps:
      - name: Resolve release SHA
        id: resolve
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "The publish workflow must be started from main, got '$GITHUB_REF_NAME'."
            exit 1
          fi

          release_sha="$GITHUB_SHA"
          if [ -z "$release_sha" ]; then
            echo "Unable to resolve the release SHA."
            exit 1
          fi

          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "Release SHA: $release_sha"

      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.release_sha }}
          fetch-depth: 0

      - name: Resolve crate metadata
        id: meta
        run: |
          case "$CRATE_NAME" in
            packed_spatial_index)
              manifest="Cargo.toml"
              changelog="CHANGELOG.md"
              tag_prefix="psi"
              ;;
            packed_spatial_index_geo)
              manifest="geo/Cargo.toml"
              changelog="geo/CHANGELOG.md"
              tag_prefix="psi-geo"
              ;;
            *)
              echo "Unknown crate: $CRATE_NAME"
              exit 1
              ;;
          esac

          version="$(python3 -c "import tomllib; print(tomllib.load(open('$manifest', 'rb'))['package']['version'])")"

          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
          echo "changelog=$changelog" >> "$GITHUB_OUTPUT"
          echo "tag_prefix=$tag_prefix" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release crate: $CRATE_NAME $version ($tag_prefix-v$version)"

      - name: Ignore non-release commits
        id: release
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          subject="$(git log -1 --pretty=%s)"
          expected="release: prepare $CRATE_NAME v$VERSION"

          echo "Commit subject: $subject"
          echo "Expected release subject: $expected"

          if [ "$subject" != "$expected" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Not a release commit for $CRATE_NAME; nothing to publish."
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Check CI passed for this commit
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.resolve.outputs.release_sha }}
        run: |
          ci_url="$(gh run list \
            --workflow ci.yml \
            --branch main \
            --commit "$RELEASE_SHA" \
            --json conclusion,status,url \
            --limit 20 \
            --jq '.[] | select(.status == "completed" and .conclusion == "success") | .url' \
            | head -n 1)"

          if [ -z "$ci_url" ]; then
            echo "No successful CI: Rust checks run found for $RELEASE_SHA."
            echo "Wait for CI to pass on main, then rerun this workflow."
            exit 1
          fi

          echo "Using successful CI run: $ci_url"

      - name: Install stable Rust
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Check changelog section
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          CHANGELOG: ${{ steps.meta.outputs.changelog }}
        run: |
          awk -v head="## [$VERSION]" '
            index($0, head) == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' "$CHANGELOG" > release-notes-preflight.md

          if ! grep -Eq '[^[:space:]]' release-notes-preflight.md; then
            echo "No non-empty changelog section found for $VERSION in $CHANGELOG."
            exit 1
          fi

      - name: Check internal dependencies are published
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        env:
          MANIFEST: ${{ steps.meta.outputs.manifest }}
        run: |
          set -euo pipefail

          deps="$(python3 -c "
          import tomllib
          m = tomllib.load(open('$MANIFEST', 'rb'))
          internal = {'packed_spatial_index'}
          for name, spec in m.get('dependencies', {}).items():
              if name in internal and isinstance(spec, dict) and 'version' in spec:
                  print(name, spec['version'])
          ")"

          if [ -z "$deps" ]; then
            echo "$CRATE_NAME has no internal crate dependencies to verify."
          fi

          while read -r name ver; do
            if [ -z "$name" ]; then
              continue
            fi
            status="$(curl --user-agent "$CRATE_NAME-release-check" --silent --output /dev/null --write-out "%{http_code}" "https://crates.io/api/v1/crates/$name/$ver")"
            if [ "$status" != "200" ]; then
              echo "Dependency $name $ver (pinned by $CRATE_NAME) is not published on crates.io (status $status)."
              exit 1
            fi
            echo "Dependency $name $ver is published."
          done < <(printf '%s\n' "$deps")

      - name: Check semver compatibility
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        env:
          MANIFEST: ${{ steps.meta.outputs.manifest }}
        run: |
          status="$(curl --user-agent "$CRATE_NAME-release-check" --silent --output /dev/null --write-out "%{http_code}" "https://crates.io/api/v1/crates/$CRATE_NAME")"
          if [ "$status" = "200" ]; then
            cargo semver-checks --manifest-path "$MANIFEST"
          elif [ "$status" = "404" ]; then
            echo "$CRATE_NAME is not published yet; skipping semver-checks for first release."
          else
            echo "Unexpected crates.io status while checking $CRATE_NAME: $status"
            exit 1
          fi

      - name: Install nightly Rust for docs.rs check
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        run: rustup toolchain install nightly --profile minimal

      - name: Verify docs.rs build
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        env:
          MANIFEST: ${{ steps.meta.outputs.manifest }}
          RUSTDOCFLAGS: --cfg docsrs -D warnings
        run: cargo +nightly doc --manifest-path "$MANIFEST" --no-deps --all-features

      - name: Check version is unpublished
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          status="$(curl --user-agent "$CRATE_NAME-release-check" --silent --output /dev/null --write-out "%{http_code}" "https://crates.io/api/v1/crates/$CRATE_NAME/$VERSION")"
          if [ "$status" = "200" ]; then
            echo "$CRATE_NAME $VERSION is already published."
            exit 1
          fi
          if [ "$status" != "404" ]; then
            echo "Unexpected crates.io status while checking version: $status"
            exit 1
          fi

      - name: Check release tag is absent
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_PREFIX: ${{ steps.meta.outputs.tag_prefix }}
        run: |
          tag="$TAG_PREFIX-v$VERSION"
          tag_status=0
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1 || tag_status=$?
          if [ "$tag_status" = "0" ]; then
            echo "Release tag '$tag' already exists."
            exit 1
          fi
          if [ "$tag_status" != "2" ]; then
            echo "Unable to check release tag '$tag'."
            exit "$tag_status"
          fi

      - name: Publish dry run
        if: ${{ steps.release.outputs.should_publish == 'true' }}
        env:
          MANIFEST: ${{ steps.meta.outputs.manifest }}
        run: cargo publish --dry-run --manifest-path "$MANIFEST"

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.should_publish == 'true' }}
    environment: release
    permissions:
      contents: write
      id-token: write

    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      MANIFEST: ${{ needs.preflight.outputs.manifest }}
      CHANGELOG: ${{ needs.preflight.outputs.changelog }}
      TAG_PREFIX: ${{ needs.preflight.outputs.tag_prefix }}

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check release commit still matches Cargo.toml
        run: |
          actual_version="$(python3 -c "import tomllib; print(tomllib.load(open('$MANIFEST', 'rb'))['package']['version'])")"
          subject="$(git log -1 --pretty=%s)"
          expected="release: prepare $CRATE_NAME v$actual_version"

          if [ "$actual_version" != "$VERSION" ]; then
            echo "Cargo.toml version is '$actual_version', preflight version was '$VERSION'."
            exit 1
          fi

          if [ "$subject" != "$expected" ]; then
            echo "Release commit subject changed or is invalid."
            echo "Expected: $expected"
            echo "Actual:   $subject"
            exit 1
          fi

      - name: Check version is unpublished
        run: |
          status="$(curl --user-agent "$CRATE_NAME-release-check" --silent --output /dev/null --write-out "%{http_code}" "https://crates.io/api/v1/crates/$CRATE_NAME/$VERSION")"
          if [ "$status" = "200" ]; then
            echo "$CRATE_NAME $VERSION is already published."
            exit 1
          fi
          if [ "$status" != "404" ]; then
            echo "Unexpected crates.io status while checking version: $status"
            exit 1
          fi

      - name: Check release tag is absent
        run: |
          tag="$TAG_PREFIX-v$VERSION"
          tag_status=0
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1 || tag_status=$?
          if [ "$tag_status" = "0" ]; then
            echo "Release tag '$tag' already exists."
            exit 1
          fi
          if [ "$tag_status" != "2" ]; then
            echo "Unable to check release tag '$tag'."
            exit "$tag_status"
          fi

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        run: cargo publish --manifest-path "$MANIFEST"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create release tag
        run: |
          tag="$TAG_PREFIX-v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "$CRATE_NAME $VERSION"
          git push origin "refs/tags/$tag"

      - name: Extract changelog section
        run: |
          awk -v head="## [$VERSION]" '
            index($0, head) == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' "$CHANGELOG" > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for $VERSION in $CHANGELOG."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$TAG_PREFIX-v$VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; nothing to do."
            exit 0
          fi
          gh release create "$tag" \
            --title "$CRATE_NAME $VERSION" \
            --notes-file release-notes.md \
            --verify-tag
