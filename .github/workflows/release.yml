name: "Release: create GitHub release"
run-name: "release: create GitHub release ${{ github.ref_name }}"

on:
  push:
    tags:
      - "psi-v[0-9]*.[0-9]*.[0-9]*"
      - "psi-geo-v[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: github-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  github-release:
    name: github-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: meta
        env:
          TAG: ${{ github.ref_name }}
        run: |
          case "$TAG" in
            psi-geo-v*)
              crate="packed_spatial_index_geo"
              version="${TAG#psi-geo-v}"
              changelog="geo/CHANGELOG.md"
              ;;
            psi-v*)
              crate="packed_spatial_index"
              version="${TAG#psi-v}"
              changelog="CHANGELOG.md"
              ;;
            *)
              echo "Unsupported release tag: $TAG"
              exit 1
              ;;
          esac

          echo "crate=$crate" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "changelog=$changelog" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG ($crate $version)"

      - name: Extract changelog section
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          CHANGELOG: ${{ steps.meta.outputs.changelog }}
        run: |
          awk -v head="## [$VERSION]" '
            index($0, head) == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' "$CHANGELOG" > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for $VERSION in $CHANGELOG."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          CRATE_NAME: ${{ steps.meta.outputs.crate }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$CRATE_NAME $VERSION" \
            --notes-file release-notes.md \
            --verify-tag
