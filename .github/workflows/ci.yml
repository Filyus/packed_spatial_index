name: "CI: Rust checks"

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel an in-progress run when a newer commit lands on the same ref, so two
# quick pushes don't run two full CIs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: default, flags: "" }
          - { name: all-features, flags: "--all-features" }
          - { name: no-default, flags: "--no-default-features" }
          - { name: parallel, flags: "--no-default-features --features parallel" }
          - { name: simd, flags: "--no-default-features --features simd" }
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}
      - name: Test
        # --tests + --examples (not --all-targets) so the heavy criterion benches
        # are not compiled in every leg; they get their own job below.
        run: cargo test --tests --examples ${{ matrix.flags }}
      - name: Doctests
        if: ${{ matrix.name == 'all-features' }}
        run: cargo test --doc --all-features

  lint:
    name: lint & docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint all features
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Check docs all features
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Check docs no default features
        run: cargo doc --no-deps --no-default-features
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install MSRV Rust (1.89.0)
        uses: dtolnay/rust-toolchain@1.89.0
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --lib --all-features

  wasm:
    name: wasm demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Check wasm SIMD build
        run: cargo check --target wasm32-unknown-unknown --no-default-features --features simd
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: wasm-demo/package-lock.json
      - name: Build WASM demo
        working-directory: wasm-demo
        run: |
          npm ci
          npm run build

  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: List packaged files
        run: cargo package --list
      - name: Package crate
        run: cargo package

  # The geospatial companion crate has its own heavy arrow/parquet dependency
  # tree, so it gets an isolated lane (own cache) and never touches the core legs.
  geo:
    name: geo (companion crate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: geo
          workspaces: geo
      - name: Check formatting
        run: cargo fmt --all --check --manifest-path geo/Cargo.toml
      - name: Lint
        run: cargo clippy --manifest-path geo/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Check query-only feature gate
        run: cargo check --manifest-path geo/Cargo.toml --no-default-features
      - name: Check FlatGeobuf without Parquet
        run: cargo check --manifest-path geo/Cargo.toml --no-default-features --features flatgeobuf
      - name: Check GeoJSON without Parquet
        run: cargo check --manifest-path geo/Cargo.toml --no-default-features --features geojson
      - name: Test
        run: cargo test --manifest-path geo/Cargo.toml --all-features

  # The geo crate's MSRV is pinned by its heavy deps (and the core path-dep) to
  # 1.89; verify it stays buildable there, like the core msrv job.
  geo-msrv:
    name: geo msrv
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install MSRV Rust (1.89.0)
        uses: dtolnay/rust-toolchain@1.89.0
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: geo-msrv
          workspaces: geo
      - name: Check geo MSRV
        run: cargo check --manifest-path geo/Cargo.toml --all-features

  # The local native server is a separate binary crate, not part of the root
  # package or geo crate. Keep it in CI so the artifact-first API can't drift.
  server:
    name: server crate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: server
          workspaces: server
      - name: Check formatting
        run: cargo fmt --all --check --manifest-path server/Cargo.toml
      - name: Test
        run: cargo test --manifest-path server/Cargo.toml --locked
      - name: Lint
        run: cargo clippy --manifest-path server/Cargo.toml --all-targets --locked -- -D warnings

  # The Rust demo crates are not in the published package and not built by the
  # other legs, so compile-check them here — a core API change can't silently rot
  # the worker or the seed tools.
  demo:
    name: demo crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: demo
          workspaces: |
            wasm-demo/r2-sim
            wasm-demo/geo-seed
            wasm-demo/worker
            wasm-demo/geo-worker
      - name: Check r2-sim
        run: cargo check --manifest-path wasm-demo/r2-sim/Cargo.toml
      - name: Check geo-seed
        run: cargo check --manifest-path wasm-demo/geo-seed/Cargo.toml
      - name: Check worker (wasm)
        run: cargo check --manifest-path wasm-demo/worker/Cargo.toml --target wasm32-unknown-unknown
      - name: Check geo worker (wasm)
        run: cargo check --manifest-path wasm-demo/geo-worker/Cargo.toml --target wasm32-unknown-unknown
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: wasm-demo/geo-worker/package-lock.json
      - name: Build geo worker
        working-directory: wasm-demo/geo-worker
        run: |
          npm ci
          npm run build:wasm
          npm run typecheck
