name: "First release only: create tag"
run-name: "first-release: tag ${{ inputs.crate }} ${{ inputs.version }}"

# For a brand-new crate the first publish is done locally with a short-lived
# token (Trusted Publishing cannot publish a crate that does not exist yet). This
# one-off workflow then creates the crate's release tag after confirming the
# version is already on crates.io, then creates the GitHub release from the
# crate changelog. Subsequent releases are tagged and released by publish.yml.
on:
  workflow_dispatch:
    inputs:
      crate:
        description: Crate to tag
        required: true
        type: choice
        options:
          - packed_spatial_index
          - packed_spatial_index_geo
      version:
        description: Cargo.toml version to tag
        required: true
        type: string
      confirm:
        description: Type 'tag <crate>' to confirm
        required: true
        type: string

concurrency:
  group: release-tag
  cancel-in-progress: false

permissions:
  contents: write

env:
  CRATE_NAME: ${{ inputs.crate }}
  REQUESTED_VERSION: ${{ inputs.version }}

jobs:
  tag:
    name: tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve crate metadata
        id: meta
        run: |
          case "$CRATE_NAME" in
            packed_spatial_index)
              manifest="Cargo.toml"
              changelog="CHANGELOG.md"
              tag_prefix="psi"
              ;;
            packed_spatial_index_geo)
              manifest="geo/Cargo.toml"
              changelog="geo/CHANGELOG.md"
              tag_prefix="psi-geo"
              ;;
            *)
              echo "Unknown crate: $CRATE_NAME"
              exit 1
              ;;
          esac
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
          echo "changelog=$changelog" >> "$GITHUB_OUTPUT"
          echo "tag_prefix=$tag_prefix" >> "$GITHUB_OUTPUT"

      - name: Check release branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Release tags must be created from main, got '$GITHUB_REF_NAME'."
            exit 1
          fi

      - name: Check requested version
        env:
          MANIFEST: ${{ steps.meta.outputs.manifest }}
        run: |
          actual_version="$(python3 -c "import tomllib; print(tomllib.load(open('$MANIFEST', 'rb'))['package']['version'])")"
          if [ "$actual_version" != "$REQUESTED_VERSION" ]; then
            echo "$MANIFEST version is '$actual_version', requested '$REQUESTED_VERSION'."
            exit 1
          fi

      - name: Check confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          expected="tag $CRATE_NAME"
          if [ "$CONFIRM" != "$expected" ]; then
            echo "To create the release tag, set confirm to: $expected"
            exit 1
          fi

      - name: Check version is published
        run: |
          status="$(curl --user-agent "$CRATE_NAME-release-tag-check" --silent --output /dev/null --write-out "%{http_code}" "https://crates.io/api/v1/crates/$CRATE_NAME/$REQUESTED_VERSION")"
          if [ "$status" != "200" ]; then
            echo "$CRATE_NAME $REQUESTED_VERSION is not published on crates.io yet (status $status)."
            exit 1
          fi

      - name: Check release tag is absent
        env:
          TAG_PREFIX: ${{ steps.meta.outputs.tag_prefix }}
        run: |
          tag="$TAG_PREFIX-v$REQUESTED_VERSION"
          tag_status=0
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1 || tag_status=$?
          if [ "$tag_status" = "0" ]; then
            echo "Release tag '$tag' already exists."
            exit 1
          fi
          if [ "$tag_status" != "2" ]; then
            echo "Unable to check release tag '$tag'."
            exit "$tag_status"
          fi

      - name: Create release tag
        env:
          TAG_PREFIX: ${{ steps.meta.outputs.tag_prefix }}
        run: |
          tag="$TAG_PREFIX-v$REQUESTED_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "$CRATE_NAME $REQUESTED_VERSION"
          git push origin "refs/tags/$tag"

      - name: Extract changelog section
        env:
          CHANGELOG: ${{ steps.meta.outputs.changelog }}
        run: |
          awk -v head="## [$REQUESTED_VERSION]" '
            index($0, head) == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' "$CHANGELOG" > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for $REQUESTED_VERSION in $CHANGELOG."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_PREFIX: ${{ steps.meta.outputs.tag_prefix }}
        run: |
          tag="$TAG_PREFIX-v$REQUESTED_VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; nothing to do."
            exit 0
          fi
          gh release create "$tag" \
            --title "$CRATE_NAME $REQUESTED_VERSION" \
            --notes-file release-notes.md \
            --verify-tag
