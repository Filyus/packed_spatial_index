name: "First release only: create tag"

on:
  workflow_dispatch:
    inputs:
      version:
        description: Cargo.toml version to tag
        required: true
        type: string
      confirm:
        description: Type 'tag packed_spatial_index' to create the tag
        required: true
        type: string

concurrency:
  group: release-tag
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    name: tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check release branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Release tags must be created from main, got '$GITHUB_REF_NAME'."
            exit 1
          fi

      - name: Check requested version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          actual_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$actual_version" != "$REQUESTED_VERSION" ]; then
            echo "Cargo.toml version is '$actual_version', requested '$REQUESTED_VERSION'."
            exit 1
          fi

      - name: Check confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          expected="tag packed_spatial_index"
          if [ "$CONFIRM" != "$expected" ]; then
            echo "To create the release tag, set confirm to: $expected"
            exit 1
          fi

      - name: Check version is published
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          status="$(curl --user-agent "packed_spatial_index-release-tag-check" --silent --output /dev/null --write-out "%{http_code}" "https://crates.io/api/v1/crates/packed_spatial_index/$REQUESTED_VERSION")"
          if [ "$status" != "200" ]; then
            echo "packed_spatial_index $REQUESTED_VERSION is not published on crates.io yet (status $status)."
            exit 1
          fi

      - name: Check release tag is absent
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          tag="v$REQUESTED_VERSION"
          tag_status=0
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1 || tag_status=$?
          if [ "$tag_status" = "0" ]; then
            echo "Release tag '$tag' already exists."
            exit 1
          fi
          if [ "$tag_status" != "2" ]; then
            echo "Unable to check release tag '$tag'."
            exit "$tag_status"
          fi

      - name: Create release tag
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          tag="v$REQUESTED_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "packed_spatial_index $REQUESTED_VERSION"
          git push origin "refs/tags/$tag"
