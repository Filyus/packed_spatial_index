name: "Release: publish crate"
run-name: "release: publish crate ${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: Cargo.toml version to publish
        required: true
        type: string
      publish:
        description: Publish after preflight succeeds
        required: true
        default: false
        type: boolean
      confirm:
        description: Type 'publish packed_spatial_index' to publish
        required: false
        type: string

concurrency:
  group: crates-io-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check release branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Releases must be run from main, got '$GITHUB_REF_NAME'."
            exit 1
          fi

      - name: Check requested version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          actual_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$actual_version" != "$REQUESTED_VERSION" ]; then
            echo "Cargo.toml version is '$actual_version', requested '$REQUESTED_VERSION'."
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test all features
        run: cargo test --all-targets --all-features

      - name: Lint all features
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check docs all features
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: List packaged files
        run: cargo package --list

      - name: Check version is unpublished
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          status="$(curl --user-agent "packed_spatial_index-release-check" --silent --output /dev/null --write-out "%{http_code}" "https://crates.io/api/v1/crates/packed_spatial_index/$REQUESTED_VERSION")"
          if [ "$status" = "200" ]; then
            echo "packed_spatial_index $REQUESTED_VERSION is already published."
            exit 1
          fi
          if [ "$status" != "404" ]; then
            echo "Unexpected crates.io status while checking version: $status"
            exit 1
          fi

      - name: Check release tag is absent
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          tag="v$REQUESTED_VERSION"
          tag_status=0
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1 || tag_status=$?
          if [ "$tag_status" = "0" ]; then
            echo "Release tag '$tag' already exists."
            exit 1
          fi
          if [ "$tag_status" != "2" ]; then
            echo "Unable to check release tag '$tag'."
            exit "$tag_status"
          fi

      - name: Publish dry run
        run: cargo publish --dry-run

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ inputs.publish }}
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check requested version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          actual_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$actual_version" != "$REQUESTED_VERSION" ]; then
            echo "Cargo.toml version is '$actual_version', requested '$REQUESTED_VERSION'."
            exit 1
          fi

      - name: Check publish confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          expected="publish packed_spatial_index"
          if [ "$CONFIRM" != "$expected" ]; then
            echo "To publish, set confirm to: $expected"
            exit 1
          fi

      - name: Check version is unpublished
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          status="$(curl --user-agent "packed_spatial_index-release-check" --silent --output /dev/null --write-out "%{http_code}" "https://crates.io/api/v1/crates/packed_spatial_index/$REQUESTED_VERSION")"
          if [ "$status" = "200" ]; then
            echo "packed_spatial_index $REQUESTED_VERSION is already published."
            exit 1
          fi
          if [ "$status" != "404" ]; then
            echo "Unexpected crates.io status while checking version: $status"
            exit 1
          fi

      - name: Check release tag is absent
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          tag="v$REQUESTED_VERSION"
          tag_status=0
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1 || tag_status=$?
          if [ "$tag_status" = "0" ]; then
            echo "Release tag '$tag' already exists."
            exit 1
          fi
          if [ "$tag_status" != "2" ]; then
            echo "Unable to check release tag '$tag'."
            exit "$tag_status"
          fi

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create release tag
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          tag="v$REQUESTED_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "packed_spatial_index $REQUESTED_VERSION"
          git push origin "refs/tags/$tag"
