# release-plz is configured in a safe PR-only mode for now.
#
# The workflow runs manually and calls only `release-pr`, never `release`.
# Publishing, tag creation, and GitHub Releases are disabled here as an extra
# guardrail while we evaluate the workflow.

[workspace]
allow_dirty = false
changelog_update = true
dependencies_update = false
git_release_enable = false
git_tag_enable = false
publish = false
release_always = false
# The first commit domain drives release notes. Keep this broad enough for
# module/public-type domains (`index3d:`, `views:`, `hilbert:`), while skipped
# release housekeeping domains stay out of this regex.
release_commits = "^(api|builder|builder2d|builder3d|index|index2d|index3d|2d|3d|box|boxes|box2d|box3d|bounds|bounds2d|bounds3d|point|points|point2d|point3d|geometry|config|default|defaults|error|errors|safety|unsafe|simd|simd2d|simd3d|simd-view|simd-views|soa|index2d_soa|index3d_soa|avx|avx2|avx512|avx-512|sse|persistence|persist|serialize|serialization|deserialize|load|loader|view|views|view2d|view3d|format|file-format|magic|bytes|buffer|zerocopy|zero-copy|knn|neighbor|neighbors|nearest|search|visitor|visit|traversal|workspace|perf|performance|parallel|radix|node|nodes|node-size|node_size|nodesize|prefetch|sort|sort2d|sort3d|sortkey|hilbert|hilbert2d|morton|encoder|encoders|encoding|bench|benches|benchmark|benchmarks|flatgeobuf|static-aabb|static_aabb|compare|comparison|test|tests|correctness|fuzz|fuzzing|refactor|layout|tree|internal|module|modules|docs|doc|readme|rustdoc|example|examples|build|ci|deps|dependency|dependencies|edition|meta|package|packaging|workflow|github|publish|tag|trusted-publishing|release-plz|msrv|rust-version|license|badges)(,|:)"
pr_branch_prefix = "release-plz-"
pr_draft = true
pr_labels = ["release"]
pr_name = "release: prepare packed_spatial_index v{{ version }}"
repo_url = "https://github.com/Filyus/packed_spatial_index"
semver_check = true

[changelog]
header = """
# Changelog

All notable changes to this crate are documented here.

## [Unreleased]

"""
body = """
## [{{ version }}]{%- if release_link -%}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | group_by(attribute="group") %}
{% set clean_group = group | striptags | trim %}
{% if clean_group != "Documentation" and clean_group != "Tests" and clean_group != "Refactoring" and clean_group != "Build, CI, and Packaging" %}
### {{ clean_group }}

{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}) {% endfor %}){% endif %}
{% endfor %}

{% endif %}
{% endfor %}
{% for group, commits in commits | group_by(attribute="group") %}
{% set clean_group = group | striptags | trim %}
{% if clean_group == "Documentation" %}
### {{ clean_group }}

{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}) {% endfor %}){% endif %}
{% endfor %}

{% endif %}
{% endfor %}
{% for group, commits in commits | group_by(attribute="group") %}
{% set clean_group = group | striptags | trim %}
{% if clean_group == "Tests" %}
### {{ clean_group }}

{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}) {% endfor %}){% endif %}
{% endfor %}

{% endif %}
{% endfor %}
{% for group, commits in commits | group_by(attribute="group") %}
{% set clean_group = group | striptags | trim %}
{% if clean_group == "Refactoring" %}
### {{ clean_group }}

{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}) {% endfor %}){% endif %}
{% endfor %}

{% endif %}
{% endfor %}
{% for group, commits in commits | group_by(attribute="group") %}
{% set clean_group = group | striptags | trim %}
{% if clean_group == "Build, CI, and Packaging" %}
### {{ clean_group }}

{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}) {% endfor %}){% endif %}
{% endfor %}

{% endif %}
{% endfor %}
"""
trim = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
protect_breaking_commits = true

# `build:` is reserved for Cargo/build-system work. Use `builder:` for
# Index2DBuilder/Index3DBuilder API changes.
commit_parsers = [
  { message = "^release(?:,|:)", skip = true },
  { message = "^repo(?:,|:)", skip = true },
  { message = "^changelog(?:,|:)", skip = true },
  { message = "^(api|builder|config|defaults?|errors?)(?:,|:)", group = "API" },
  { message = "^(2d|index2d|builder2d|sort2d|hilbert2d|box2d|bounds2d|point2d)(?:,|:)", group = "2D" },
  { message = "^(3d|index3d|builder3d|sort3d|box3d|bounds3d|point3d)(?:,|:)", group = "3D" },
  { message = "^(index)(?:,|:)", group = "Indexes" },
  { message = "^(geometry|boxes?|bounds|points?)(?:,|:)", group = "Geometry" },
  { message = "^(safety|unsafe)(?:,|:)", group = "Safety" },
  { message = "^(simd|simd2d|simd3d|simd-views?|soa|index2d_soa|index3d_soa|avx|avx2|avx512|avx-512|sse)(?:,|:)", group = "SIMD" },
  { message = "^(persistence|persist|serialize|serialization|deserialize|load|loader|views?|view2d|view3d|format|file-format|magic|bytes|buffer|zerocopy|zero-copy)(?:,|:)", group = "Persistence" },
  { message = "^(knn|neighbors?|nearest)(?:,|:)", group = "Nearest Neighbors" },
  { message = "^(search|visitor|visit|traversal|workspace)(?:,|:)", group = "Search" },
  { message = "^(perf|performance|parallel|radix|nodes?|node-size|node_size|nodesize|prefetch)(?:,|:)", group = "Performance" },
  { message = "^(sort|sortkey|hilbert|morton|encoders?|encoding)(?:,|:)", group = "Sorting and Encoding" },
  { message = "^(bench|benches|benchmarks?|flatgeobuf|static-aabb|static_aabb|compare|comparison)(?:,|:)", group = "Benchmarks" },
  { message = "^(test|tests|correctness|fuzz|fuzzing)(?:,|:)", group = "Tests" },
  { message = "^(refactor|layout|tree|internal|modules?)(?:,|:)", group = "Refactoring" },
  { message = "^(docs?|readme|rustdoc|examples?)(?:,|:)", group = "Documentation" },
  { message = "^(build|ci|deps|dependencies?|edition|meta|package|packaging|workflow|github|publish|tag|trusted-publishing|release-plz|msrv|rust-version|license|badges)(?:,|:)", group = "Build, CI, and Packaging" },
]

link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/Filyus/packed_spatial_index/issues/$1" },
]
