# release-plz is configured in a safe PR-only mode for now.
#
# The workflow runs manually and calls only `release-pr`, never `release`.
# Publishing, tag creation, and GitHub Releases are disabled here as an extra
# guardrail while we evaluate the workflow.

[workspace]
allow_dirty = false
changelog_update = true
dependencies_update = false
git_release_enable = false
git_tag_enable = false
publish = false
release_always = false
release_commits = "^(api|build|bounds3d|sort3d|simd|simd3d|persistence|knn|perf|search|sortkey|bench|benches|test|tests|docs|refactor|layout|ci|deps|edition|meta|package)(,|:)"
pr_branch_prefix = "release-plz-"
pr_draft = true
pr_labels = ["release"]
pr_name = "release: prepare packed_spatial_index v{{ version }}"
repo_url = "https://github.com/Filyus/packed_spatial_index"
semver_check = true

[changelog]
header = """
# Changelog

All notable changes to this crate are documented here.

## [Unreleased]

"""
body = """
## [{{ version }}]{%- if release_link -%}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}

{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}) {% endfor %}){% endif %}
{% endfor %}

{% endfor %}
"""
trim = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
protect_breaking_commits = true

commit_parsers = [
  { message = "^api(?:,|:)", group = "<!-- 00 --> API" },
  { message = "^build(?:,|:)", group = "<!-- 00 --> API" },
  { message = "^bounds3d(?:,|:)", group = "<!-- 01 --> 3D" },
  { message = "^sort3d(?:,|:)", group = "<!-- 01 --> 3D" },
  { message = "^simd(?:,|:)", group = "<!-- 02 --> SIMD" },
  { message = "^simd3d(?:,|:)", group = "<!-- 02 --> SIMD" },
  { message = "^persistence(?:,|:)", group = "<!-- 03 --> Persistence" },
  { message = "^knn(?:,|:)", group = "<!-- 04 --> Nearest Neighbors" },
  { message = "^perf(?:,|:)", group = "<!-- 05 --> Performance" },
  { message = "^search(?:,|:)", group = "<!-- 05 --> Performance" },
  { message = "^sortkey(?:,|:)", group = "<!-- 05 --> Performance" },
  { message = "^bench(?:,|:)", group = "<!-- 06 --> Benchmarks" },
  { message = "^benches(?:,|:)", group = "<!-- 06 --> Benchmarks" },
  { message = "^test(?:,|:)", group = "<!-- 07 --> Tests" },
  { message = "^tests(?:,|:)", group = "<!-- 07 --> Tests" },
  { message = "^refactor(?:,|:)", group = "<!-- 08 --> Refactoring" },
  { message = "^layout(?:,|:)", group = "<!-- 08 --> Refactoring" },
  { message = "^docs(?:,|:)", group = "<!-- 90 --> Documentation" },
  { message = "^ci(?:,|:)", group = "<!-- 99 --> Build, CI, and Packaging" },
  { message = "^deps(?:,|:)", group = "<!-- 99 --> Build, CI, and Packaging" },
  { message = "^edition(?:,|:)", group = "<!-- 99 --> Build, CI, and Packaging" },
  { message = "^meta(?:,|:)", group = "<!-- 99 --> Build, CI, and Packaging" },
  { message = "^package(?:,|:)", group = "<!-- 99 --> Build, CI, and Packaging" },
  { message = "^release(?:,|:)", skip = true },
  { message = "^repo(?:,|:)", skip = true },
]

link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/Filyus/packed_spatial_index/issues/$1" },
]
