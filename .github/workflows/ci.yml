name: "CI: Rust checks"

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check MSRV
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          cargo +1.89.0 check --lib --all-features

      - name: Test default features
        run: cargo test --all-targets

      - name: Test all features
        run: cargo test --all-targets --all-features

      - name: Test no default features
        run: cargo test --all-targets --no-default-features

      - name: Test parallel feature
        run: cargo test --all-targets --no-default-features --features parallel

      - name: Test simd feature
        run: cargo test --all-targets --no-default-features --features simd

      - name: Check wasm SIMD build
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check --target wasm32-unknown-unknown --no-default-features --features simd

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: wasm-demo/package-lock.json

      - name: Build WASM demo
        working-directory: wasm-demo
        run: |
          npm ci
          npm run build

      - name: Lint all features
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check docs all features
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Check docs no default features
        run: cargo doc --no-deps --no-default-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: List packaged files
        run: cargo package --list

      - name: Package crate
        run: cargo package
